<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD131 - Form</title>
    <meta name="description"
        content="Responsive form project featuring required field validation, submission confirmation, a visit counter, and an optimized user experience for mobile and desktop users.">
    <meta name="author" content="Fernanda Amador">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/form.css">

    <!-- JAVASCRIPT -->
    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Choose a Product ...</option>
            </select>

            <fieldset class="rating">
                <legend>Overall Rating</legend>

                <label>
                    ☆
                    <input type="radio" name="rating" value="1" required>
                </label>

                <label>
                    ☆☆
                    <input type="radio" name="rating" value="2">
                </label>

                <label>
                    ☆☆☆
                    <input type="radio" name="rating" value="3">
                </label>

                <label>
                    ☆☆☆☆
                    <input type="radio" name="rating" value="4">
                </label>

                <label>
                    ☆☆☆☆☆
                    <input type="radio" name="rating" value="5">
                </label>
            </fieldset>

            <label for="install-date">Date of Installation</label>
            <input type="date" id="install-date" name="install-date" required>

            <fieldset>
                <legend>Which features did you find useful in the product?<br>
                    <em>(Check all that apply)</em>
                </legend>

                <label><input type="checkbox" name="features" value="durability"> Durability</label>

                <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>

                <label><input type="checkbox" name="features" value="performance"> Performance</label>

                <label><input type="checkbox" name="features" value="design"> Design</label>
            </fieldset>

            <label for="review">Written Review <span class="optional">(Optional)</span></label>
            <textarea id="review" name="review" rows="6"></textarea>

            <label for="username">Your Name <span class="optional">(Optional)</span></label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>
            &copy; <span id="currentyear"></span> 🦋 Fernanda Amador 🦋 Mexico
        </p>

        <p id="lastModified"></p>
    </footer>
</body>

</html>
