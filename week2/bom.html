<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Book Of Mormon </title>
    <meta name="description"
        content="This app allows users to enter their favorite Book of Mormon chapters and display them in a list that updates automatically on the screen.">

    <meta name="author" content="Fernanda Amador">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Acme&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/week2/styles/bom.css">

    <!-- JavaScript -->
    <script src="/week2/scripts/bom.js" defer></script>

</head>

<body>
    <h1>📖 Book of Mormon - Top 10</h1>
    <main>
        <label for="favchap">Enter Book and Chapter: </label>
        <input type="text" id="favchap" placeholder="Alma 5">
        <button type="submit">Add Chapter</button>
        <ul id="list"></ul>
        <button aria-label="Close" id="close-button">❌</button>
    </main>

</body>

</html>
