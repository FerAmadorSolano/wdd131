<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BookNest Library</title>
    <meta name="description" content="BookNest Library - Learn more about BookNest Library and our reading community.">
    <meta name="author" content="Fernanda Amador">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/contact.css">

    <!-- JAVASCRIPT -->
    <script src="scripts/contact.js" defer></script>
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/logo.svg" alt="BookNest Library logo">
            <h1>BookNest Library</h1>
        </div>

        <button id="menu-btn" aria-label="Open Menu">
            ☰
        </button>

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="catalog.html">Catalog</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">

            <h2>Join Our Reading Club</h2>

            <form id="contact-form">

                <label for="name">Full Name</label>

                <input type="text" id="name" required>

                <label for="email">Email</label>

                <input type="email" id="email" required>

                <label for="genre">
                    Favorite Genre
                </label>

                <select id="genre">

                    <option>Fantasy</option>
                    <option>Mystery</option>
                    <option>Romance</option>
                    <option>Science Fiction</option>
                    <option>History</option>

                </select>

                <label for="message">
                    Message
                </label>

                <textarea id="message" rows="5"></textarea>

                <button type="submit">
                    Join Now
                </button>

            </form>

            <div id="confirmation"></div>

        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div>
                <h3>BockNest Library</h3>
                <p>A place to discover, save and share books</p>
            </div>

            <div>
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="html.html">Home</a></li>
                    <li><a href="catalog.html">Catalog</a></li>
                    <li><a href="favorites.html">Favorites</a></li>

                </ul>
            </div>

            <div>
                <h3>Help</h3>
                <ul>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="references.html">References</a></li>
                </ul>
            </div>

            <div>
                <h3>Follow Us</h3>

                <div class="socials">
                    <a href="#">FB</a>
                    <a href="#">IG</a>
                    <a href="#">X</a>
                </div>
            </div>
        </div>
        <p>
            &copy; <span id="currentyear"></span> 🦋 Fernanda Amador 🦋 Mexico
        </p>

        <p id="lastModified"></p>
    </footer>
</body>

</html>
